name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "v2.3.0"
  ANCHOR_VERSION: "0.32.1"

jobs:
  program:
    name: Build & Test Program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "${HOME}/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          export PATH="${HOME}/.local/share/solana/install/active_release/bin:${PATH}"
          solana --version

      # Anchor calls `cargo +solana build`. Solana's installer registers a
      # "solana" rustup toolchain, but its Cargo (1.84) can't parse
      # edition2024 crates. Link the Solana SDK into the stable toolchain's
      # sysroot so `cargo +solana` uses the newer Cargo while still finding
      # the Solana BPF/SBF targets.
      - name: Fix Solana toolchain for edition2024 compat
        run: |
          SOLANA_TOOLCHAIN="${HOME}/.local/share/solana/install/active_release/bin/sdk/sbf/dependencies/platform-tools/rust"
          # If the solana toolchain exists in rustup, remove it and re-link with stable
          rustup toolchain remove solana 2>/dev/null || true
          rustup toolchain link solana "$(rustup run stable rustc --print sysroot)"
          # Verify
          cargo +solana --version
          rustc +solana --version

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.avm
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"
          anchor --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --force

      - name: Build program
        run: anchor build

      - name: Run tests
        run: anchor test
