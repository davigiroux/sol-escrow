name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "v2.1.21"
  ANCHOR_VERSION: "0.32.1"

jobs:
  program:
    name: Build & Test Program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          SOLANA_BIN="${HOME}/.local/share/solana/install/active_release/bin"
          # Symlink only solana binaries — do NOT add the full dir to PATH
          # because it contains cargo/rustc 1.79 that would shadow the real toolchain
          for cmd in solana solana-keygen solana-test-validator solana-validator; do
            [ -f "${SOLANA_BIN}/${cmd}" ] && sudo ln -sf "${SOLANA_BIN}/${cmd}" "/usr/local/bin/${cmd}"
          done
          solana --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"
          anchor --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --force

      - name: Build program
        run: anchor build

      - name: Run tests
        run: anchor test
