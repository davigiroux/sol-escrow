name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "v2.3.0"
  ANCHOR_VERSION: "0.32.1"

jobs:
  program:
    name: Build & Test Program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "${HOME}/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          export PATH="${HOME}/.local/share/solana/install/active_release/bin:${PATH}"
          solana --version

      # Solana bundles an older Rust (1.84). Put dtolnay toolchain first
      # so Cargo can handle edition2024 crates (blake3 >=1.8.3).
      - name: Prioritise system Rust over Solana-bundled toolchain
        run: |
          echo "${HOME}/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin" >> "$GITHUB_PATH"
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.avm
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"
          anchor --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --force

      - name: Build program
        run: anchor build

      - name: Run tests
        run: anchor test
